include:
  - ./tiers.yaml
  - ./provider/cohere.yaml
  - ./provider/github-models.yaml
  - ./provider/google.yaml
  - ./provider/groq.yaml
  - ./provider/huggingface.yaml
  - ./provider/misc-providers.yaml
  - ./provider/nvidia-nim.yaml
  - ./provider/openai.yaml
  - ./provider/openrouter.yaml
  - ./provider/perplexity.yaml
  - ./provider/publicai.yaml
  - ./provider/sambanova.yaml

litellm_settings:
  drop_params: true
  modify_params: true
  num_retries: 2
  request_timeout: 300
  json_logs: true
  telemetry: false
  success_callback: ["postgres", "helicone"]
  failure_callback: ["postgres", "helicone"]
  default_fallbacks: ["smart", "long"]
  context_window_fallbacks:
    - coder: ["long", "smart"]
    - smart: ["long"]
    - fast: ["smart", "long"]
    - reasoning: ["long"]
    - vision: ["long"]
    - long: ["reasoning"]

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 60
  cooldown_time: 60
  allowed_fails: 2
  retry_after: 5
  enable_pre_call_checks: true
  enable_weighted_failover: true
  retry_policy: {
    "AuthenticationErrorRetries": 0,
    "TimeoutErrorRetries": 2,
    "RateLimitErrorRetries": 3,
    "ContentPolicyViolationErrorRetries": 1,
    "InternalServerErrorRetries": 2
  }
  allowed_fails_policy: {
    "BadRequestErrorAllowedFails": 1000,
    "AuthenticationErrorAllowedFails": 3,
    "TimeoutErrorAllowedFails": 5,
    "RateLimitErrorAllowedFails": 10000,
    "InternalServerErrorAllowedFails": 5
  }

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  database_connection_pool_limit: 20
  database_socket_timeout: 300
  store_model_in_db: true
  disable_spend_logs: false
  ui_username: os.environ/UI_USERNAME
  ui_password: os.environ/UI_PASSWORD
  proxy_batch_write_at: 60
  disable_error_logs: false   # for debug, "true" when stable
  background_health_checks: true
  health_check_interval: 300
  # alerting: ["slack"]
  # alerting_threshold: 300
