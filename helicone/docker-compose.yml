services:
  helicone:
    image: helicone/helicone-all-in-one:latest
    container_name: helicone
    restart: unless-stopped
    ports:
      - "3000:3000"   # Web Dashboard
      - "8585:8585"   # Jawn API + LLM Proxy
      - "9080:9080"   # MinIO S3 (save request/response body)
    environment:
      - SITE_URL=${HELICONE_SITE_URL}
      - BETTER_AUTH_URL=${HELICONE_SITE_URL}
      - NEXT_PUBLIC_APP_URL=${HELICONE_SITE_URL}
      - NEXT_PUBLIC_HELICONE_JAWN_SERVICE=${HELICONE_JAWN_URL}
      - S3_ENDPOINT=${HELICONE_S3_URL}
      - NEXT_PUBLIC_IS_ON_PREM=false
      - BETTER_AUTH_SECRET=${HELICONE_AUTH_SECRET}
    volumes:
      - helicone_postgres:/var/lib/postgresql/data
      - helicone_clickhouse:/var/lib/clickhouse
      - helicone_minio:/data
    networks:
      - helicone_net

volumes:
  helicone_postgres:
  helicone_clickhouse:
  helicone_minio:

networks:
  helicone_net:
    name: helicone_net